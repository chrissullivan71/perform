		  /* Page basics */
		  body {
			margin: 0;

			background: #1e1e1e;
			color: white;

			overflow: hidden;

			-webkit-user-select: none;
			-webkit-touch-callout: none;
		  }

		  /* Canvas */
		  #gameCanvas {
			position: absolute;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			display: block;
			background: #1e1e1e;
			cursor: pointer;
			z-index: 0;
			pointer-events: auto;
		  }

		/* Song selector: place and aligned to the right; limit width so it won't span the page */
			#songSelector {
			  position: absolute;
			  bottom: 10px;        /* moved to bottom right */
			  right: 10px;
			  z-index: 2500;
			  padding: 8px 10px;
			  border-radius: 6px;
			  border: 2px solid #00ff00;
			  background: rgba(0,0,0,0.7);
			  color: #fff;
			  font-family: 'Consolas', monospace;
			  font-size: 14px;
			  box-sizing: border-box;
			  /* prevent full-width stretching */
			  width: auto;           /* let the selector size to its contents */
			  min-width: 160px;      /* minimum usable size */
			  max-width: 420px;      /* caps width so it won't span the canvas */
			  display: inline-block; /* avoid block-level width expansion */
			  overflow: hidden;
			  text-overflow: ellipsis;
			  white-space: nowrap;
			}

		  /* Right-side help block */
		  #controls {
			position: absolute;
			top: 200px;
			right: 10px;
			z-index: 100;
			color: #00ff00;
			font-size: 12px;
			text-align: right;
			max-width: 300px;
		  }

		  /* Debug info */
		  #debugInfo {
			position: absolute;
			top: 200px;
			right: 10px;
			z-index: 100;
			background: rgba(0,0,0,0.8);
			border: 2px solid #ffff00;
			padding: 10px;
			border-radius: 5px;
			color: #ffff00;
			font-size: 11px;
			max-width: 300px;
			display: none;
		  }

		  /* Control row (single consolidated definition).
			 Anchored bottom-left; JS may nudge it to the right to avoid tape/emoji. */
		  #controlRow {
			position: absolute;
			left: 10px;                /* anchor at the bottom-left by default */
			right: auto;               /* clear any right anchor */
			bottom: 70px;
			z-index: 2000;             /* keep above canvas */
			display: flex;
			flex-direction: row;
			align-items: center;
			gap: 8px;
			pointer-events: auto;
			transform-origin: left bottom;
			flex-wrap: wrap;                           /* allow the row to wrap if it gets too long */
			max-width: calc(100% - 360px);             /* leave room on the right for help text */
			box-sizing: border-box;
			padding: 6px 4px;                          /* small padding around the group */
		  }

		  /* Buttons & speed control inside the row */
		  #controlRow button,
		  #controlRow #speedControl {
			position: relative;
			background: rgba(0,200,0,0.8);
			color: white;
			border: 2px solid #00ff00;
			padding: 8px 12px;                         /* reduced horizontal padding */
			font-size: 14px;                           /* reduced font-size */
			font-weight: bold;
			cursor: pointer;
			border-radius: 5px;
			font-family: 'Consolas', monospace;
			white-space: nowrap;
			box-sizing: border-box;
			min-width: 92px;                           /* prevents too-small buttons */
			max-width: 160px;                          /* caps length */
			overflow: hidden;
			text-overflow: ellipsis;
			flex: 0 0 auto;
		  }

		  /* Slightly smaller restart button */
		  #restartButton {
			padding: 6px 10px;
			font-size: 13px;
			background: rgba(200,0,0,0.8);
			border-color: #ff0000;
		  }

		  /* Hover / paused visuals */
		  #ListenButton:hover,
		  #playListenButton:hover, {
			background: rgba(0,255,0,0.9);
		  }
		  #ListenButton.paused,
		  #playListenButton.paused, {
			background: rgba(200,100,0,0.8);
			border-color: #ff8800;
		  }

		  /* Speed control box styling */
		  #controlRow #speedControl {
			background: rgba(0,0,0,0.7);
			border: 2px solid #00ff00;
			padding: 6px 8px;
			border-radius: 5px;
			color: white;
			font-size: 12px;
			display: none;
			flex-direction: column;
			align-items: flex-start;
			gap: 6px;
			min-width: 140px;
			max-width: 220px;
		  }

		  /* Slider width */
		  #speedSlider {
			width: 120px;
			margin: 0;
		  }

		  /* Emoji / audio indicator */
		  .emoji-fill {
			color: transparent !important;
			text-shadow: 0 0 0 #000;
		  }
		  #musicEmojis {
			position: absolute !important;
			z-index: 3000 !important;
			pointer-events: none;
			font-size: 32px;
			transform: scaleX(0.8);     /* slightly compress horizontally */
			transform-origin: left bottom;
			line-height: 1;
			display: inline-block;
		  }
		  
		  #speedControl, #delayControl {
			display: none;
		  }
		  
	</style>

		function getAssetColor(assetFile) {
			const aParam = window.assetMode;
			if (!aParam || aParam === 'local' || aParam === '') return "orange";
			if (aParam === 'pages' || aParam === 'p') return "green";
			if (aParam && aParam.startsWith('http')) {

		// pointInPolygon(point, polygon)
		// Detects if a given [x, y] point is inside a polygon region.
		// Used for checking button clicks and hit-testing.
		// Helps interact with tape controls accurately.
		// Uses ray-casting or winding algorithm for containment check.
        function pointInPolygon(point, polygon) {
            const [x, y] = point;
            let inside = false;
            
            let j = polygon.length - 1;
            for (let i = 0; i < polygon.length; i++) {
                const [xi, yi] = polygon[i];
                const [xj, yj] = polygon[j];
                
                if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
                    inside = !inside;
                }
                j = i;
            }
            
            return inside;
        }

                } else if (clickedButton === "forward") {

                } else if (clickedButton === "fast_forward") {
                    // Jump to next line

                        bounceCount = 0;

                } else if (clickedButton === "fast_rewind") {

                } else if (clickedButton === "pause") {

                            bounceStartTime += pauseDuration;

		// Adjusts the position of the control row relative to emoji and tape controls.

		// Keeps UI accessible and logically placed.

		// Position controlRow relative to the emoji using the fixed constant width.
		// gapPx: separation between emoji and control row; marginPx: viewport margin.
		function positionControlRowByConstant(controlRowWidthPx = CONTROLS_PLUS_EMOJI_WIDTH, gapPx = 8, marginPx = 6) {
			var emoji = document.getElementById('musicEmojis');
			var row = document.getElementById('controlRow');
			if (!emoji || !row) return;

			// Measure emoji only (we do not rely on the row measured width)
			var eRect = emoji.getBoundingClientRect(); 
			var vw = window.innerWidth;
			var vh = window.innerHeight; 
			if (!controlRowWidthPx || controlRowWidthPx > vw) controlRowWidthPx = row.getBoundingClientRect().width;

			// Preferred left if placing to the right of emoji
			var placeRightLeft = Math.round(eRect.right + gapPx);

			// Preferred left if placing to the left of emoji
			var placeLeftLeft = Math.round(eRect.left - gapPx - controlRowWidthPx);

			// Allowed clamped left range
			var minLeft = marginPx;
			var maxLeft = Math.max(minLeft, vw - controlRowWidthPx - marginPx);

			var chosenLeft;
			if (placeRightLeft <= maxLeft) {
				// room on the right
				chosenLeft = placeRightLeft;
			} else if (placeLeftLeft >= minLeft) {
				// not enough room on right; room on left
				chosenLeft = placeLeftLeft;
			} else {
				// neither ideal; clamp to viewport with margin
				chosenLeft = Math.min(Math.max(placeRightLeft, minLeft), maxLeft);
			}

			// Apply left and bottom; clear right so left takes effect
			row.style.right = '';
			row.style.left = Math.max(minLeft, Math.round(chosenLeft)) + 'px';

			// Vertically align bottom to the emoji bottom (stable)
			var emojiBottom = Math.round(eRect.bottom);
			var bottomPx = Math.round(vh - emojiBottom);
			row.style.bottom = Math.max(marginPx, bottomPx) + 'px';
		}

			if (!window.__emojiPlaced) {

				emojiSpan.style.pointerEvents = 'none';

				// Same control geometry math used by the renderer
				var controlsHeight = Math.round(canvas.height / 3 + 72);

				var controlsWidth = Math.round(controlsHeight * CONTROLS_ASPECT);
				var controlsX = 20;

				var canvasRect = canvas.getBoundingClientRect();
				var controlsLeftPage = Math.round(canvasRect.left + window.scrollX + controlsX);
				var controlsBottomPage = Math.round(canvasRect.top + window.scrollY + controlsY + controlsHeight);

				var gapPx = (typeof GAP_MM !== 'undefined' && typeof PX_PER_MM !== 'undefined')
					? Math.round(GAP_MM * PX_PER_MM)
					: 6;

				var vertNudge = (typeof VERT_NUDGE_PX !== 'undefined') ? VERT_NUDGE_PX : 6;

				var left = controlsLeftPage + controlsWidth + gapPx;
				var bottomPx = Math.round(window.innerHeight - controlsBottomPage + vertNudge);

				emojiSpan.style.left = Math.max(2, left) + 'px';

		function isInsideCircle(x, y, cx, cy, r) {
		  // Returns true if point (x, y) is inside circle centered at (cx, cy) with radius r
		  const dx = x - cx;
		  const dy = y - cy;

		// getRidOfLL(cleanedLine)
		// Removes 'LL' (Lyric Line) tags and related markers from a line.
		// Cleans up song content for rendering and beat processing.
		// Used during song parsing to strip metadata.
		// Ensures only visible part of lines is sent to teleprompter.
		function getRidOfLL(cleanedLine) {
			cleanedLine = cleanedLine.replace(/\t/g, '    ');
			
			// Handle both LL (lyric lines) and NB (no beat/instrumental lines)
			if (cleanedLine.includes('LL')) {
				const llIndex = cleanedLine.indexOf('LL');
				cleanedLine = cleanedLine.substring(0, llIndex).trimEnd();
				
				if (cleanedLine.includes('ZZZ')) {
					const zzzIndex = cleanedLine.indexOf('ZZZ');
					cleanedLine = cleanedLine.substring(0, zzzIndex).trimEnd();
				}
			} else if (cleanedLine.includes('NB')) {  // NEW: Handle instrumental lines Number of Bars
				const nbIndex = cleanedLine.indexOf('NB');
				cleanedLine = cleanedLine.substring(0, nbIndex).trimEnd();
				
				if (cleanedLine.includes('I01')) {
					const i01Index = cleanedLine.indexOf('I01');
					cleanedLine = cleanedLine.substring(0, i01Index).trimEnd();
				}
			}
			return cleanedLine;
		}
        
		// findBeatPositions(beatLine)
		// Finds all beat number and character index pairs in a beat line.
		// Returns an array of [beatNum, charIndex] per beat.
		// Used for highlighting syllables and chords in sync.
		// Enables accurate bounce/teleprompter animation by beat.
        function findBeatPositions(beatLine) {
            const beats = [];
            const regex = /\d+/g;
            let match;
            while ((match = regex.exec(beatLine)) !== null) {
                const beatNum = parseInt(match[0]);
				if (beatNum >= 1 && beatNum <= 19) {
                    beats.push([beatNum, match.index]);
                }
            }
            return beats;
        }

		// extractItemAtPosition(line, charIndex)
		// Extracts the word or chord at a specific character index in a line.
		// Used for linking beats to visible content.
		// Helps render and highlight the correct syllable/chord per beat.
		// Ensures visual syncing between music and lyrics.
        function extractItemAtPosition(line, charIndex) {
            if (charIndex >= line.length) return "";
            
            let start = charIndex;
            while (start > 0 && line[start-1] !== ' ') {
                start--;
            }
            
            let end = charIndex;
            while (end < line.length && line[end] !== ' ') {
                end++;
            }
            
            return line.substring(start, end).trim();
        }

		/*
		extractSyllableAtPosition(line, charIndex)
		Extracts syllable from a word based on character index and dictionary.
		Used for syllable-by-syllable highlighting in lyrics.
		Enables teleprompter to bounce exactly on each beat.
		Improves readability for performers and karaoke style animation.
		*/
		function extractSyllableAtPosition(line, charIndex) {
			// debugger;
			if (charIndex >= line.length) return "";
			
			// Find word boundaries at this character position
			let wordStart = charIndex;
			while (wordStart > 0 && line[wordStart-1] !== ' ') {
				wordStart--;
			}
			
			let wordEnd = charIndex;
			while (wordEnd < line.length && line[wordEnd] !== ' ') {
				wordEnd++;
			}
			
			const word = line.substring(wordStart, wordEnd).trim();
			const cleanWord = word.replace(/[^\w]/g, '').toLowerCase();
			const isFirstWord = wordStart === 0 || line.substring(0, wordStart).trim() === "";
			
			let result;
			
			// Look up syllables in dictionary and calculate which syllable at this position
			if (cleanWord in SYLLABLE_DICT) {
				const syllables = SYLLABLE_DICT[cleanWord];
				const positionInWord = charIndex - wordStart;
				
				// Special cases for specific words
				if (cleanWord === "rainbow") {
					result = positionInWord < 4 ? "rain" : "bow";
				} else if (cleanWord === "rainbows") {
					result = positionInWord < 4 ? "rain" : "bows";
				} else if (syllables.length === 1) {
					result = word;
				} else {
					// Calculate actual syllable boundaries based on character counts
					const syllableBoundaries = [];
					let charCount = 0;
					for (const syllable of syllables) {
						charCount += syllable.length;
						syllableBoundaries.push(charCount);
					}
					// Find which syllable contains this position
					result = syllables[syllables.length - 1]; // default to last syllable
					for (let i = 0; i < syllableBoundaries.length; i++) {
						if (positionInWord < syllableBoundaries[i]) {
							result = syllables[i];
							break;
						}
					}
				}
			} else {
				// Fallback: try stripped version, or just highlight the word as-is
				if (cleanWord in SYLLABLE_DICT) {
					const syllables = SYLLABLE_DICT[cleanWord];
					result = syllables.length === 1 ? word : syllables[0];
				} else {
					result = word;
				}
			}
			
			const originalWord = line.substring(wordStart, wordEnd).trim();
			const isFirstSyllable = charIndex === wordStart;
			if (isFirstWord && isFirstSyllable && originalWord.length > 0 && !originalWord.startsWith("\\")) {
				result = result.charAt(0).toUpperCase() + result.slice(1);
			}			// Capitalize first word of line unless escaped with backsl
			return result;
		}

		/*
		extractChordsAndWords(chordLine, lyricLine, beatPositions)
		Pairs up chords and lyric words at each beat position.
		Returns array of [beatNum, chord, word] for rendering.
		Facilitates accurate, synchronized display.
		Used in main render loop for dynamic highlighting.
		*/
        function extractChordsAndWords(chordLine, lyricLine, beatPositions) {
            const results = [];
            for (const [beatNum, charIndex] of beatPositions) {
                const chord = extractItemAtPosition(chordLine, charIndex);
                const word = extractItemAtPosition(lyricLine, charIndex);
                results.push([beatNum, chord, word]);
            }
            return results;
        }

            "C", "D", "E", "F", "G", "A", "B",

		/*
		checkForChordLine(line, chords)
		Determines if a line contains a chord progression.
		Helps classify lines during song parsing.
		Ensures proper visual styling and treatment for chords.
		Supports robust song format parsing for flexibility.
		*/
		function checkForChordLine(line) {
			if (!line) return false;
			const words = line.split(/\s+/).filter(word => word.trim());
			if (words.length === 0) return false;
			
			let matchCount = 0;
			for (const word of words) {
				if (CHORDS.includes(word)) {
					matchCount++;
				}
			}
			
			return matchCount / words.length >= 0.5;
		}

		/*
		categorizeLine(line)
		Classifies lines in the song as 'sections', 'chords', 'lyrics', or 'beats'.
		Used during song parsing for organizing data arrays.
		Simplifies rendering logic by separating types.
		Ensures proper handling and animation for each line type.
		*/
        function categorizeLine(line) {
            const cleanedLine = cleanText(line);
            
            if (cleanedLine.includes('[') && cleanedLine.includes(']')) {
                return "sections";
            }
            
            if (checkForChordLine(cleanedLine)) {
                return "chords";
            }
            
            const pattern = /[a-zA-Z\s]+/;
            if (pattern.test(cleanedLine)) {
				if (!cleanedLine.includes('ZZZ') && !cleanedLine.includes('I01')) {
					return "lyrics";
				} else if (cleanedLine.includes('ZZZ') || cleanedLine.includes('I01')) {
					return "beats";
				}
			}
            return "unknown";
        }

		/*
		parseTimeSignature(timeSignatureStr)
		Parses 3/4, 4/4, etc., from the song file.
		Returns numeric [beatsPerMeasure, noteValue].
		Used for adapting bounce/line animation timing.
		Supports multiple time signatures for song diversity.
		*/
        function parseTimeSignature(timeSignatureStr) {
            try {
                if (timeSignatureStr.includes('/')) {
                    const parts = timeSignatureStr.split('/');
                    return [parseInt(parts[0]), parseInt(parts[1])];
                }
            } catch (e) {
                dlog(`Could not parse time signature: ${timeSignatureStr}, using 4/4`);
            }
            return [4, 4];
        }
        
		/*
		getSectionBounceCount(sectionHeader, defaultBounceCount)
		Extracts a custom bounce count from section headers ({N} tags).
		Overrides per-section animation speed.
		Lets you set unique bounce patterns for different song parts.
		Used for fine-tuning animation for complex songs.
		*/
		function getSectionBounceCount(sectionHeader, defaultBounceCount) {
            const match = sectionHeader.match(/\{(\d+)\}/);
            if (match) {
                return parseInt(match[1], 10);
            }
            return defaultBounceCount;
        }
		
		function buildHighlightedStatus() {
			highlightedStatus = {};
			for (const lineIdx in beatChordWordData) {
				highlightedStatus[lineIdx] = {};
				for (let syllIdx = 0; syllIdx < beatChordWordData[lineIdx].length; syllIdx++) {
					highlightedStatus[lineIdx][syllIdx] = false;
				}
			}
		}
		
		/*
		processSongData(data)
		Parses loaded song text into sections, chords, lyrics, beats.
		Sets timing and bounce patterns based on parsed info.
		Initializes arrays needed for teleprompter and animation.
		Prepares song data for accurate, beat-synced performance.
		*/
        function processSongData(data) {
            const lines = data.split('\n').filter(line => line.trim());
            
            const title = lines[0] || "[No title]";
            const timeSignatureStr = lines[1] || "4/4";
            const remainingLines = lines.slice(2);
            
            // Parse time signature and set song-specific timing
            const [beatsPerMeasure, noteValue] = parseTimeSignature(timeSignatureStr);
            // Set bounces per line and bounce duration based on time signature and song
			// debugger;;

			songConfig = songFileMap[currentSongKey];
			BounceDuration = songConfig.bounceDuration;   // Use per-song or fallback
			BOUNCES_PER_LINE = songConfig.bouncesPerLine;           // Use per-song or
            speedMultiplier = speedValues[currentSpeedIndex];
            bounceDuration = BounceDuration / speedMultiplier;
			halfBounce = bounceDuration / 2;
			
            dlog(`Time signature: ${beatsPerMeasure}/${noteValue}, Bounces per line: ${BOUNCES_PER_LINE}, Bounce duration: ${bounceDuration}`);
            
            sections = [];
            chords = [];
            lyrics = [];
            beats = [];
            beatChordWordData = {};

			beatPositionsCache = {};
            sectionBounceCounts = []; // Reset for new song
            
            for (let i = 0; i < remainingLines.length; i++) {
                const line = remainingLines[i];
                const lineType = categorizeLine(line);
                
                if (lineType === "sections") {
                    sections.push(line);
                    // --- NEW: set bounce count for this section ---
                    // assume default is BOUNCES_PER_LINE * 1 line per section header.
                    // If you want to count lyric lines per section, you can enhance this logic.
                    const defaultBounceCount = BOUNCES_PER_LINE; // or customize as needed
                    const bounceCount = getSectionBounceCount(line, defaultBounceCount);
                    sectionBounceCounts.push(bounceCount);
                } else if (lineType === "chords") {
                    chords.push(line);
                } else if (lineType === "lyrics") {
                    lyrics.push(line);
                } else if (lineType === "beats") {
                    beats.push(line);
                    
                    const cleanedBeatLine = getRidOfLL(line);
                    const beatPositions = findBeatPositions(cleanedBeatLine);
                    const beatLineIndex = beats.length - 1;
                    
                    if (beatLineIndex < chords.length && beatLineIndex < lyrics.length) {
                        const chordLine = getRidOfLL(chords[beatLineIndex]);
                        const lyricLine = getRidOfLL(lyrics[beatLineIndex]);
                        const chordWordData = extractChordsAndWords(chordLine, lyricLine, beatPositions);
                        beatChordWordData[beatLineIndex] = chordWordData;
						beatPositionsCache[beatLineIndex] = beatPositions;
                    }

		// Returns the correct file path or URL (local, GitHub Pages, or remote) for a given asset,

		function getAssetSource(assetFile) {
			const params = new URLSearchParams(window.location.search);
			const aParam = params.get('a');
			
			// If explicit parameter provided, use it
			if (aParam === 'pages' || aParam === 'p') {
				return getPagesBaseURL() + assetFile;
			} else if (aParam && aParam.startsWith('http')) {
				return aParam + assetFile;

		/*
		Orchestrates loading of images and the selected song.
		Updates asset status balls to reflect progress.
		Calls image and song loaders in sequence.
		Handles fallback logic for missing assets.
		*/
		function loadAssetsAndSong(currentSongKey) {
			// Reset all balls to grey
			assetStatus.tape_deck = "grey";
			assetStatus.mag_tape = "grey";
			assetStatus.background = "grey";
			assetStatus.song = "grey";
			drawAssetStatusBallsOnCanvas();

			const params = new URLSearchParams(window.location.search);
			const aParam = params.get('a');

			const images = [
				{ name: 'tape_deck', file: 'controls.jpg' },
				{ name: 'mag_tape', file: 'magtape.jpg' },
				{ name: 'background', file: songFileMap[currentSongKey]?.background || 'background.jpg' }
			];

			let i = 0;

			dlog("Loading all visual/audio assets for:", currentSongKey, "AssetMode:", aParam);

	/*
	Expanded Line-By-Line Explanation of Asset Image Loading

	- Creates a new Image object (`img`) and sets crossOrigin so images can load from any domain.
	- Sets `img.src` to begin loading the asset from the calculated URL (`src`), based on local/Pages/remote.
	- Sets up `img.onload` handler:
		- Marks asset status (color) using `getAssetColor`.
		- Stores loaded image in the correct variable (`controlsImage`, `magTapeImage`, or `backgroundImage`).
		- If loading the tape deck, also rescales button polygons for accurate click regions.
		- Draws the asset status balls to reflect asset state visually.
		- Moves loader index forward, calls `loadNextImage()` to keep loading remaining assets.
	- Sets up `img.onerror` handler (image failed):
		- If in Pages mode (`?a=pages` or `?a=p`):
			- Creates a fallback Image object (`img2`) and builds Pages URL.
			- Sets up fallback `img2.onload` handler:
				- Marks asset status as "green".
				- Stores the fallback image, rescales button coords if tape deck.
				- Updates visual asset balls, moves to next asset, calls `loadNextImage()`.
			- Sets up fallback `img2.onerror` handler:
				- Marks asset status as "black" (failed).
				- Updates asset balls, shows alert dialog, proceeds to next asset, calls `loadNextImage()`.
			- Begins fallback image load (`img2.src = pagesSrc`).
		- Else (no fallback), marks asset as failed ("black"), updates status balls, shows alert, and proceeds to next asset.
	- Always triggers asset loading (`img.src = src;`).
	- Loader function (`loadNextImage`) is recursive—loads all assets one by one, updating visuals and handling failure.
	*/


// After handling each asset (success or error), advances to the next by calling itself   // (recursion), so images load sequentially, not in parallel.

			function loadNextImage() {
				if (i >= images.length) {
					// Images done, now try song
					if (
						assetStatus.tape_deck !== "black" &&
						assetStatus.mag_tape !== "black" &&
						assetStatus.background !== "black"
					) {
						loadSongAsset(currentSongKey, aParam);
					}
					return;
				}

				const info = images[i];
				const img = new Image();
				img.crossOrigin = "anonymous";
				const src = getAssetSource(info.file, aParam);

				img.onload = function() {
					dlog(`[IMAGE] Loaded OK: ${img.src}`);
					assetStatus[info.name] = getAssetColor(info.file);
					if (info.name === 'tape_deck') { controlsImage = img; scaleButtonCoords(); }
					else if (info.name === 'mag_tape') { magTapeImage = img; }
					else if (info.name === 'background') { backgroundImage = img; }
					drawAssetStatusBallsOnCanvas();
					i++;
					loadNextImage();
				};

				img.onerror = function() {
					console.warn(`[IMAGE] FAILED to load: ${img.src}`);
					// Fallback for Pages mode only
					if (!aParam || aParam === 'pages' || aParam === 'p') {
						const pagesSrc = getPagesBaseURL() + info.file;
						const img2 = new Image();
						img2.crossOrigin = "anonymous";
						img2.onload = function() {
							assetStatus[info.name] = "green";
							if (info.name === 'tape_deck') { controlsImage = img2; scaleButtonCoords(); }
							else if (info.name === 'mag_tape') { magTapeImage = img2; }
							else if (info.name === 'background') { backgroundImage = img2; }
							drawAssetStatusBallsOnCanvas();
							i++;
							loadNextImage();
						};
						img2.onerror = function() {
							assetStatus[info.name] = "black";
							drawAssetStatusBallsOnCanvas();
							alert(`Error loading ${info.file} from both ${src} and Pages fallback.`);
							i++;
							loadNextImage();
						};
						img2.src = pagesSrc;
					} else {
						assetStatus[info.name] = "black";
						drawAssetStatusBallsOnCanvas();
						alert(`Error loading ${info.file} from ${src}`);
						i++;
						loadNextImage();
					}
				};

				dlog(`[IMAGE] Trying to load: ${images[i].file} as ${img.src}`);
				img.src = src;
			}
			loadNextImage();
		}		

		function parseHLData(text) {
			HL_APPOINTMENTS = [];
			const lines = text.split('\n');
			const start = lines.findIndex(l => l.trim() === '[');
			const end = lines.findIndex(l => l.trim() === ']');
			if (start === -1 || end === -1) return;
			const jsonText = lines.slice(start, end + 1).join('\n');
			try {
				const parsed = JSON.parse(jsonText);
				HL_APPOINTMENTS = parsed.map(a => ({ ...a, fired: false }));
				dlog("HL_APPOINTMENTS loaded:", HL_APPOINTMENTS);
			} catch (e) {

		/*

		Loads the song text file or embedded data for the selected song.

		Ensures music and lyrics are available for rendering and animation.

		async function loadSongAsset(currentSongKey, aParam) {
			// --- Local Variables ---
			// songText: assigned in try/catch block
			// response: Response object (fetch result), assigned inline when used

			const fileName = songFileMap[currentSongKey]?.base;
			const lyricFile = fileName ? fileName + ".txt?v=" + Date.now() : null;
			let primarySrc = "";

			if (

			) {
				assetStatus.song = "grey";
				drawAssetStatusBallsOnCanvas();
				return;
			}

			// Asset paths

			if (fileName) {
				if (aParam === 'pages' || aParam === 'p') {
					primarySrc = getPagesBaseURL() + lyricFile;
					fallbackSrc = lyricFile;
					primaryColor = "green";
					fallbackColor = "orange";
				} else if (aParam && aParam.startsWith('http')) {
					primarySrc = aParam + lyricFile;
					fallbackSrc = getPagesBaseURL() + lyricFile;
					primaryColor = "green";
					fallbackColor = "green";
				} else {
					primarySrc = lyricFile;
					fallbackSrc = getPagesBaseURL() + lyricFile;
					primaryColor = "orange";
					fallbackColor = "green";
				}

				// Set & load audio
				audioElement.src = getAssetSource(fileName + '.mp3?v=' + Date.now());
				audioElement.load();
				dlog("7. Trying to load: ", audioElement.src);
				// Lyrics loading logic (with fallback, and finally embedded)
				let songText = null;
				try {
					// First try primary source
					const response = await fetch(primarySrc);
					if (!response.ok) throw new Error();
					songText = await response.text();
					assetStatus.song = primaryColor;
				} catch {
					// Try fallback source
					try {
						const response = await fetch(fallbackSrc);
						if (!response.ok) throw new Error();
						songText = await response.text();
						assetStatus.song = fallbackColor;
					} catch {
						// Try embedded data
						if (embeddedSongs[currentSongKey]) {

				try {

					if (hlResponse.ok) {

						parseHLData(hlText);
					} else {
						HL_APPOINTMENTS = [];

				} catch {
					HL_APPOINTMENTS = [];

				dlog("lyrics[0]:", lyrics[0]);

				dlog("lyrics[2]:", lyrics[2]);
				dlog("chords[0]:", chords[0]);
				dlog("chords[1]:", chords[1]);
				dlog("chords[2]:", chords[2]);

			} else {
				// No fileName: try embedded directly
				if (embeddedSongs[currentSongKey]) {
					assetStatus.song = "pink";
					drawAssetStatusBallsOnCanvas();
					processSongData(embeddedSongs[currentSongKey]);
				} else {
					assetStatus.song = "black";
					drawAssetStatusBallsOnCanvas();
					alert('ERROR: Song could not be loaded from any source.');
				}
			}
		    songConfig = songFileMap[currentSongKey];
			baseBounceDuration = songConfig.bounceDuration;   // Use per-song or fallback
			BOUNCES_PER_LINE = songConfig.bouncesPerLine;           // Use per-song or fallback

		// interpolateColor(color1, color2, factor)
		// Linearly blends two RGB colors by a given factor (0..1).
		// Used for gradients and progress indicators.
		// Helps with animated color transitions and visual feedback.
		// Makes UI elements more dynamic and responsive.
        function interpolateColor(color1, color2, factor) {
            const r = Math.floor(color1[0] + (color2[0] - color1[0]) * factor);
            const g = Math.floor(color1[1] + (color2[1] - color1[1]) * factor);
            const b = Math.floor(color1[2] + (color2[2] - color1[2]) * factor);
            return [r, g, b];
        }

		// colorToString(color)
		// Converts an RGB array ([r, g, b]) to a CSS rgb() string.
		// Used for setting fill and stroke colors in canvas drawings.
		// Helper to standardize color usage throughout rendering.
		// Ensures colors appear correctly in all drawing functions.
        function colorToString(color) {
            return `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
        }

		/*
		renderText(text, x, y, color, fontSize = 40, align = 'left', baseline = 'alphabetic')
		// Draws text on the canvas at a specific position, with styling.
		// Supports lyrics, chords, section headers, and debug info.
		// Handles highlighting and precise placement.
		// Used for all major text elements in render loop.
		*/
		function renderText(text, x, y, color, fontSize = 36, align = 'left', baseline = 'alphabetic') {
			ctx.font = `bold ${fontSize}px 'Consolas', monospace`;
			ctx.textAlign = align;           // 'left' | 'center' | 'right'
			ctx.textBaseline = baseline;     // 'alphabetic' | 'top' | 'bottom' | etc.
			// subtle stroke for readability, then fill
			ctx.lineWidth = Math.max(1, Math.round(fontSize * 0.06));
			ctx.strokeStyle = 'rgba(0,0,0,0.65)';
			ctx.strokeText(text, x, y);
			ctx.fillStyle = colorToString(color);
			ctx.fillText(text, x, y);
			// return measured width so callers can easily center if needed
			return ctx.measureText(text).width;
		}  

		/*
		calculatePixelPosition(text, x, charIndex, fontSize)
		Calculates X coordinate for a character in a string.
		Used for precisely placing syllables/chords in the canvas.
		Supports accurate highlighting during animations.
		Essential for beat-synced teleprompter visuals.
		*/
		 function calculatePixelPosition(text, x, charIndex, fontSize = 36) {
			if (charIndex >= text.length) return x;
			
			// Skip leading spaces or quotes at charIndex
			while (charIndex < text.length && !/[a-zA-Z*]/.test(text[charIndex])) {
				charIndex++;
			}	
			
			ctx.font = `bold ${fontSize}px 'Consolas', monospace`;
			const textBefore = text.substring(0, charIndex);
			const width = ctx.measureText(textBefore).width;
			return x + width;
		}

		// Supports karaoke style bouncing ball animation.
		// Essential for dynamic per-beat feedback.
		*/
        function renderWordAtPosition(word, x, y, color, fontSize = 36) {
            ctx.font = `bold ${fontSize}px 'Consolas', monospace`;
            ctx.fillStyle = colorToString(color);
            ctx.fillText(word, x, y);
        }

					  ctx.fillStyle = '#1e1e1e';
					  ctx.fillRect(pixelX, POSITION_LYRIC_LINE - 35, syllableWidth, 45);
					  renderWordAtPosition(currentHLWord, pixelX, POSITION_LYRIC_LINE, [0, 255, 255]);
					}
				}			}
			if (sections.length > 0) {
			  renderText(sections[currentIndex % sections.length], 5, POSITION_SECTION, [0, 0, 255]);
			}
		  }

		  // Update debug info
		  if (debugMode && debugData) {
			let debugText = `Line: ${currentIndex + 1}/${lyrics.length}\n`;
			debugText += `Bounce: ${bounceCount}/${BOUNCES_PER_LINE}\n`;
			debugText += `Beat Numbers: [${BEAT_NUMBERS.join(', ')}]\n`;
			debugText += `Playback Mode: ${playbackMode}\n`;
			debugText += `Speed: ${speedLabels[currentSpeedIndex]}\n`;
			debugText += `Duration: ${bounceDuration.toFixed(3)}s\n`;
			if (BEAT_NUMBERS.length > 0) {
			  const currentBeatNumber = BEAT_NUMBERS[bounceCount % BEAT_NUMBERS.length];
			  debugText += `Current Beat: ${currentBeatNumber}\n`;
			}
			debugData.innerHTML = debugText.replace(/\n/g, '<br>');
		  }

			// Ball physics and movement
		  if (!songPaused && !animationPaused && !waitingForStart && bounceStartTime !== null) {
			const dt = currentTime - bounceStartTime;

			if (dt <= bounceDuration) {
			  const fallTime = bounceDuration / 2;

			  if (dt <= fallTime) {
				falling = true;
				rising = false;
				ballY = ballTop + 0.5 * gravity * (dt ** 2);
				if (ballY >= ballBottom) ballY = ballBottom;
			  } else {
				const riseTime = dt - fallTime;
				falling = false;
				rising = true;
				const remainingRiseTime = fallTime - riseTime;
				ballY = ballTop + 0.5 * gravity * (remainingRiseTime ** 2);
				if (ballY < ballTop) ballY = ballTop;
			  }
			} else {
			  // Complete bounce cycle - start new bounce
			  bounceStartTime = currentTime;
			  ballY = ballTop;

			  if (highlightedStatus[currentIndex]) {
				highlightedStatus[currentIndex][bounceCount] = true;
			  }

			  bounceCount++;

			  // Advance text every BOUNCES_PER_LINE bounces
			  // we are done a line: do the next one.
			  
			  if (bounceCount >= BOUNCES_PER_LINE) {
				bounceCount = 0;
				const nextAppointmentPending = APPOINTMENTS.some(a => !a.fired && a.nextIndex === currentIndex + 1);
//				if (nextAppointmentPending) console.log('blocked at index', currentIndex, 'audio time', audioElement.currentTime.toFixed(2));
				if (!nextAppointmentPending) {
				  if (lyrics.length > 0) {
					if (currentIndex < lyrics.length - 1) {
					  currentIndex++;
					  songLineNumber++;
					} else {
					  waitingForStart = true;
					  updatePlayButton();
					}
				  }
				}
			  }
			}
		  } else if (waitingForStart) {
			ballY = BALL_HIGH_POSITION;
		  }

		  // Draw ball with highlighting
		  const shouldHighlightBall = currentIndex in beatChordWordData && rising && bounceCount < BOUNCES_PER_LINE;

		  ctx.beginPath();
		  ctx.arc(ballCenterX, ballY, ballRadius, 0, 2 * Math.PI);
		  ctx.fillStyle = shouldHighlightBall ? '#00ff00' : '#ee7621';
		  ctx.fill();

		  // draw emojis for audio playing indicator
		  drawMusicEmojis();

		// draw the asset-status ball();
		if (settingsOpen) drawSettingsOverlay();
		  
		if (!overlayMode) drawAssetStatusBallsOnCanvas();

		requestAnimationFrame(render);
	}
			
			// Initialize and start
			initBallPhysics();
			updatePlayButton();
			render();
			
			// Make canvas focusable for keyboard input
			canvas.setAttribute('tabindex', '0');
			canvas.focus();
			
			// Handle window resize
			window.addEventListener('resize', function() {
				resizeCanvas();
				initBallPhysics();
				scaleButtonCoords();
			});	

			window.addEventListener('load', () => {
				drawMusicEmojis();
				positionControlRowByConstant();
				// DO NOT trigger playListenButton.click() here!
			});

//			window.addEventListener('load', () => {
//				drawMusicEmojis();
//				positionControlRowByConstant();
//
//  the next line was removed because the rules for html changed: can't do it without user input.
//				// Automatically trigger "Play&Listen"
//				const playListenButton = document.getElementById('playListenButton');
//				if (playListenButton) playListenButton.click();
//			});

		function startTeleprompterAnimation() {
			waitingForStart = false;
			bounceStartTime = performance.now() / 1000;
			if (typeof render === "function") requestAnimationFrame(render);
			dlog("Teleprompter animation kicked off!");
		}
		
		/*
		drawAssetStatusBallsOnCanvas()
		Renders colored balls on screen to indicate asset load statuses.
		Visual feedback for images and song readiness.
		Supports user troubleshooting and quick diagnostics.
		Helps distinguish working, missing, or failed assets.
		*/
		function drawAssetStatusBallsOnCanvas() {
		  const OFFSETX = 220; // aligns with controls row
		  const RADIUS = 14;

		  // Asset balls start 10px from bottom of canvas
		  const ballsY = canvas.height - 10;

		  // Horizontally aligned (similar to controls/buttons)
		  const POSITIONS = [
			{ x: OFFSETX + 120, y: ballsY },
			{ x: OFFSETX + 220, y: ballsY },
			{ x: OFFSETX + 320, y: ballsY },
			{ x: OFFSETX + 420, y: ballsY },
		  ];

		  ctx.save();
		  const assetsArr = Object.keys(assetStatus).map(k => ({ name: k, status: assetStatus[k] }));
		  for (let i = 0; i < POSITIONS.length; i++) {
			const item = assetsArr[i] || {};
			ctx.beginPath();
			ctx.arc(POSITIONS[i].x, POSITIONS[i].y, RADIUS, 0, Math.PI * 2);
			// Set color based on status
			let color = "#00cc66";
			const st = String(item.status || "").toLowerCase();
			if (st === 'grey') color = '#999999';
			else if (st === 'green') color = '#00cc66';
			else if (st === 'orange') color = '#ff8800';
			else if (st === 'black') color = '#000000';
			else if (st === 'red') color = '#cc3333';
			else if (st === 'purple') color = '#9933cc'; // add for purple ball!

			ctx.fillStyle = color;
			ctx.fill();

			// White label
			ctx.fillStyle = '#fff';
			ctx.font = "bold 12px 'Consolas', monospace";
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';
			ctx.fillText(item.name || '', POSITIONS[i].x, POSITIONS[i].y);
		  }
		  ctx.restore();
		}

		// Constants to avoid hardcoding
		const VISITOR_MP3 = "the-visitor.mp3";

			// Defensive init after DOM is ready
			function initListeningButtons() {
				const ListenButton = document.getElementById('ListenButton');
				const playListenButton = document.getElementById('playListenButton');

				if (!ListenButton && !playListenButton) return;

				// Remember original labels
				if (ListenButton && !ListenButton.dataset.orig) ListenButton.dataset.orig = ListenButton.textContent || '▶ LISTEN';
				if (playListenButton && !playListenButton.dataset.orig) playListenButton.dataset.orig = playListenButton.textContent || '▶ PLAY&LISTEN';

				// Update the button visuals
				function setPlayingVisual(btn) {
					if (!btn) return;
					btn.classList.remove('paused');
					btn.textContent = '⏸ PAUSE';
				}

				function setPausedVisual(btn) {
					if (!btn) return;
					btn.classList.add('paused');
					btn.textContent = btn.dataset.orig || '▶';
				}

				// Toggle between playing and paused states
				function toggleVisual(btn) {
					if (!btn) return;
					if (btn.classList.contains('paused')) setPlayingVisual(btn);
					else setPausedVisual(btn);
				}
			}

				// Listen Button: Start/play or pause the audio
				function handleListenButtonClick(e) {
					e.preventDefault();
					dlog('Listen button pressed.');
					
					try {
						if (isAudioActuallyPlaying()) {
							audioElement.pause();
						} else {
							const record = songFileMap[currentSongKey];
							if (!record) {
								audioElement.src = "";
								console.warn("No valid record for currentSongKey:", currentSongKey, "- src not set.");
								return;
							}

							const audioFile = record.base + ".mp3";
							audioElement.src = getAssetSource(audioFile);
							dlog("Trying to load:", audioElement.src);

							try { audioElement.load(); } catch (err) { console.warn('audio.load() threw', err); }

							audioElement.play().catch((err) => {
								console.error("Music could not be played:", err);
								const statusEl = document.getElementById('loadingStatus');
								if (statusEl) statusEl.textContent = 'Music could not be played — see console';
							});
						}
					} catch (err) {
						console.error('Listen button handler error', err);
					}
				}

				function handlePlayListenButtonClick(e) {
					e.preventDefault();
				    if (!currentSongKey) {
					  alert('Please select a song first');
					  return;
				    }
//				    waitingForStart = false;
					togglePlayback();
//				    updatePlayButton();
//				    startTeleprompterAnimation();
//				    audioElement.currentTime = 0;
//				    audioElement.play().catch(e => dlog('Play error:', e));
					dlog('Play&Listen pressed — playing?', isAudioActuallyPlaying());
				}
				
			function initTeleprompter() {
				const ListenButton = document.getElementById('ListenButton');
				const playListenButton = document.getElementById('playListenButton');

				if (ListenButton && !ListenButton.dataset.bound) {
					ListenButton.dataset.bound = '1';
					ListenButton.addEventListener('click', handleListenButtonClick);
					ListenButton.addEventListener('touchstart', (e) => {
						e.preventDefault();
						ListenButton.click();
					}, { passive: false });
				}

				if (playListenButton && !playListenButton.dataset.bound) {
					playListenButton.dataset.bound = '1';
					playListenButton.addEventListener('click', handlePlayListenButtonClick);
					playListenButton.addEventListener('touchstart', (e) => {
						e.preventDefault();
						playListenButton.click();
					}, { passive: false });
				}

				// ... any other one-time startup stuff here
			}
			// Initialization and startup sequence.
			// Sets up visual assets, ball physics, UI state, and main render loop.
			// Runs after DOM is loaded or refreshed.
			// Ensures teleprompter is ready and responsive upon page load.
			// Initialize the buttons only after DOM is fully loaded
			
			(function initialize() {
				function allInits() {
					initListeningButtons();
					initTeleprompter();
				}
				if (document.readyState === 'loading') {
					document.addEventListener('DOMContentLoaded', allInits);
				} else {
					allInits();
				}
			})();
			
			// Step 3: Add the keyboard "Y" toggle handler globally, once.
			document.addEventListener('keydown', function(e) {
				if (e.key === 'Y' || e.key === 'y') { //
					animationPaused = !animationPaused; //
					dlog("animationPaused:", animationPaused); //
				}
			});

			songSelector.addEventListener('change', function(e) {
				currentSongKey = e.target.value; // set GLOBAL, not with let/const!

				if (!currentSongKey) {
					document.getElementById('loadingStatus').textContent = 'Select a song to begin...';
					return;
				}
				resetSong();
				console.log('togglePlayback: waitingForStart=', waitingForStart, 'lyrics.length=', lyrics.length);
				document.getElementById('loadingStatus').textContent = 'Loading ' + currentSongKey + '...';

				APPOINTMENTS = (songConfig.appointments || []).map(a => ({ ...a, fired: false }));

					img.onload = () => { chordsImage = img; };
					img.src = getAssetSource(songConfig.chords);
				}		
				
			});

			togglePlayback();	
			dlog('✅ Animation started NOW May 14, 2026 AM');
